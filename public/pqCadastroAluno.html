<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de <i class="fas fa-angle-double-down"></i></title>
    <!-- CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header text-center">
                        <h4>Cadastro de Aluno</h4>
                    </div>
                    <div class="container text-center">
                        <form>
                            <div class="row">
                                <!-- mt-3 é para controlar a distância na vertical -->
                                <!-- col-md-4 é o tamanho ocupado da coluna -->
                                <div class="col mt-3 col-md-4">
                                    <!-- <label for="raAluno" class="form-label">RA</label> -->
                                    <input type="text" class="form-control" id="raAluno" required placeholder="R.A.">
                                </div>
                                <div class="col mt-3 col-md-8">
                                    <!-- <label for="nomeAluno" class="form-label">Nome do aluno</label> -->
                                    <input type="text" class="form-control" id="nomeAluno" required
                                        placeholder="Nome do aluno">
                                </div>
                            </div>
                            <div class="row">
                                <!-- mt-3  é para controlar a distância na vertical mt = Margin Top, pode ser mb = Margin Bottom -->
                                <!-- col-md-4 é o tamanho ocupado da coluna -->
                                <div class="col mt-3 col-md-8">
                                    <!-- <label for="nomeMae" class="form-label">Nome da mãe</label> -->
                                    <input type="text" class="form-control" id="nomeMae" required
                                        placeholder="Nome da mãe">
                                </div>
                                <div class="col mt-3 col-md-4">
                                    <!-- <label for="telefoneMae" class="form-label">Telefone da mãe</label> -->
                                    <input type="tel" class="form-control telefone" id="telefoneMae" required
                                        placeholder="(00) 00000-0000">
                                </div>
                            </div>
                            <div class="row">
                                <!-- mt-3  é para controlar a distância na vertical mt = Margin Top, pode ser mb = Margin Bottom -->
                                <!-- col-md-4 é o tamanho ocupado da coluna -->
                                <div class="col mt-3 col-md-8">
                                    <!-- <label for="nomePai" class="form-label">Nome do pai</label> -->
                                    <input type="text" class="form-control" id="nomePai" required
                                        placeholder="Nome do pai">
                                </div>
                                <div class="col mt-3 col-md-4">
                                    <!-- <label for="telefonePai" class="form-label">Telefone da mãe</label> -->
                                    <input type="tel" class="form-control telefone" id="telefonePai" required
                                        placeholder="(00) 00000-0000">
                                </div>
                            </div>
                            <div class="row">
                                <!-- mt-3  é para controlar a distância na vertical mt = Margin Top, pode ser mb = Margin Bottom -->
                                <!-- col-md-4 é o tamanho ocupado da coluna -->
                                <div class="col mt-3">
                                    <!-- <label for="endereco" class="form-label">Endereço</label> -->
                                    <input type="text" class="form-control" id="endereco" required
                                        placeholder="Rua, nº e Bairro">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col mt-3 col-md-8">
                                    <div style="border:2px solid black;">
                                        <video id="video" width="320" height="240" autoplay></video>
                                        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
                                        <img id="foto" src="/img/imagem_sem_foto.png" alt="Sua foto aqui">
                                    </div>
                                </div>
                                <div class=" col mt-3 col-md-4">
                                    <button type="button" class="btn btn-primary mb-3" id="botaoTirafoto">Mostrar
                                        foto</button>
                                    <button type="button" class="btn btn-secondary mb-3">Cancelar foto</button>
                                    <button type="button" class="btn btn-success mb-3">Carrega foto</button>
                                    <button type="button" class="btn btn-success mb-3">Gravar foto</button>
                                </div>
                            </div>

                            <div class="row">
                                <!-- mb-3 Margin Bottom - distância do item para a margem abaixo -->
                                <div class="col mb-3 mt-3">
                                    <button type="submit" id="botaoCadastra"
                                        class="btn btn-primary w-100">Cadastrar</button>
                                </div>
                                <div class="col mb-3 mt-3">
                                    <button type="button" id="botaoCancela"
                                        class="btn btn-secondary w-100">Cancelar</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const foto = document.getElementById('foto');

        // Acessar a câmera
        navigator.mediaDevices.getUserMedia({
                video: true
            })
            .then(stream => {
                video.srcObject = stream;
            });

        // Tirar a foto
        document.getElementById('botaoTirafoto').addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 320, 240);
            /* 
                        video.style.display = "";
                        foto.style.display = "none"; */

            // Gerar a URL da imagem (base64)
            const dataUrl = canvas.toDataURL('image/png');
            console.log(dataUrl);
            foto.src = dataUrl; // Usa o caminho da imagem
        });
    </script>
    <script>
        $(document).ready(function () {
            $('.telefone').mask('(00) 00000-0000');
        });
    </script>

</body>

</html>
