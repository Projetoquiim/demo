<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de usuário</title>
    <!-- CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header text-center">
                        <h4>Cadastro Escola</h4>
                    </div>
                    <div class="container text-center">
                        <form>
                            <div class="row">
                                <!-- mt-3 é para controlar a distância na vertical -->
                                <!-- col-md-4 é o tamanho ocupado da coluna -->
                                <div class="col mt-3 col-md-4">
                                    <!-- <label for="inep" class="form-label">INEP</label> -->
                                    <input type="text" class="form-control" id="inep" required placeholder="INEP">
                                </div>
                                <div class="col mt-3 col-md-8">
                                    <!-- <label for="nomeEscola" class="form-label">Nome da Escola</label> -->
                                    <input type="text" class="form-control" id="nomeEscola" required
                                        placeholder="Nome da escola">
                                </div>
                            </div>
                            <div class="row">
                                <!-- mt-3  é para controlar a distância na vertical mt = Margin Top, pode ser mb = Margin Bottom -->
                                <!-- col-md-4 é o tamanho ocupado da coluna -->
                                <div class="col mt-3 col-md-4">
                                    <!-- <label for="telefoneContato" class="form-label">Telefone</label> -->
                                    <input type="tel" class="form-control" id="telefoneContato" required
                                        placeholder="(00) 00000-0000">
                                </div>
                                <div class="col mt-3 col-md-8">
                                    <!-- <label for="nomeResponsavel" class="form-label">Nome do responsável</label> -->
                                    <input type="text" class="form-control" id="nomeResponsavel" required
                                        placeholder="Nome do responsável">
                                </div>
                            </div>
                            <div class="row justify-content-center">
                                <div class="mb-3 mt-3 col-md-6">
                                    <!-- <label for="senhaResponsavel" class="form-label">Senha</label> -->
                                    <input type="password" class="form-control" id="senhaResponsavel" required
                                        placeholder="Senha">
                                </div>
                                <div class="mb-3 mt-3 col-md-6">
                                    <!-- <label for="confirmaSenha" class="form-label">Confirmar senha</label> -->
                                    <input type="password" class="form-control" id="confirmaSenha" required
                                        placeholder="Confirmar senha">
                                </div>
                            </div>
                            <div class="row">
                                <!-- mb-3 Margin Bottom - distância do item para a margem abaixo -->
                                <div class="col mb-3">
                                    <button type="submit" id="botaoCadastra"
                                        class="btn btn-primary w-100">Cadastrar</button>
                                </div>
                                <div class="col mb-3">
                                    <button type="button" id="botaoCancela"
                                        class="btn btn-secondary w-100">Cancelar</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#telefoneContato').mask('(00) 00000-0000');
        });
    </script>
</body>

</html>
